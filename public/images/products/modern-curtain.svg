<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad1)"/>
  <!-- 窗帘图标 -->
  <rect x="120" y="60" width="160" height="140" fill="#60a5fa" opacity="0.3" rx="4"/>
  <rect x="130" y="70" width="60" height="120" fill="#3b82f6" opacity="0.6" rx="2"/>
  <rect x="210" y="70" width="60" height="120" fill="#3b82f6" opacity="0.6" rx="2"/>
  <rect x="110" y="50" width="180" height="10" fill="#1e40af" rx="2"/>
  <!-- 文字 -->
  <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e40af">现代简约窗帘</text>
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Modern Curtain</text>
</svg>
